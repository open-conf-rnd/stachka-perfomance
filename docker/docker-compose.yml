# Локальная разработка: Vite dev server + nginx (HTTPS для Telegram Mini App)
# Запуск из корня проекта: docker compose -f docker/docker-compose.yml up --build
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ..:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    env_file: ../.env
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    command: ["/bin/sh", "-c", "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    depends_on:
      - app
    restart: unless-stopped
