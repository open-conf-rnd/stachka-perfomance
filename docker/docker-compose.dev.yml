# Dev: сервисы собираются по отдельности (context = своя папка), одна сеть
# Запуск из корня: docker compose -f docker/docker-compose.dev.yml up --build
services:
  app:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - app
    ports:
      - "5173:5173"
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
      - API_PORT=3000
    volumes:
      - ../api:/app
      - /app/node_modules
    networks:
      - app
    ports:
      - "3000:3000"
    restart: unless-stopped

  ws:
    build:
      context: ../ws
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
      - STATS_WS_PORT=3001
    volumes:
      - ../ws:/app
      - /app/node_modules
    networks:
      - app
    ports:
      - "3001:3001"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    env_file: ../.env
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    command: ["/bin/sh", "-c", "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    networks:
      - app
    depends_on:
      - app
      - api
      - ws
    restart: unless-stopped

networks:
  app:
    driver: bridge
