# Dev: сервисы собираются по отдельности (context = своя папка), одна сеть
# Запуск из корня: docker compose -f docker/docker-compose.dev.yml up --build
services:
  app:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - app
    ports:
      - "5173:5173"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: ../.env
    environment:
      - POSTGRES_USER=stachka
      - POSTGRES_PASSWORD=stachka
      - POSTGRES_DB=stachka
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stachka"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
      - API_PORT=${API_PORT}
      - DATABASE_URL=postgresql://stachka:stachka@postgres:5432/stachka
    volumes:
      - ../api:/app
      - /app/node_modules
    networks:
      - app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ws:
    build:
      context: ../ws
      dockerfile: Dockerfile.dev
    env_file: ../.env
    environment:
      - NODE_ENV=development
      - STATS_WS_PORT=${STATS_WS_PORT}
    volumes:
      - ../ws:/app
      - /app/node_modules
    networks:
      - app
    ports:
      - "3001:3001"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    env_file: ../.env
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    command: ["/bin/sh", "-c", "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    networks:
      - app
    depends_on:
      - app
      - api
      - ws
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
