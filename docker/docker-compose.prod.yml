# Prod: локально — build из исходников; CI — образы из GHCR
# Локально: docker compose -f docker/docker-compose.prod.yml up --build -d
# CI: IMAGE_TAG, REGISTRY, GITHUB_REPOSITORY задаются в workflow
#
# SSL: Caddy автоматически получает и обновляет сертификаты Let's Encrypt.
# .env формируется из PROD_ENV.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Данные в отдельной папке на сервере — при деплое не трогаются (down без -v)
      - /var/lib/stachka-postgres:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: ${CADDY_IMAGE:-stachka-perfomance-caddy:latest}
    build:
      context: ./caddy
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
    networks:
      - app
    depends_on:
      - web
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-stachka-perfomance-api:latest}
    build:
      context: ../api
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - API_PORT=${API_PORT}
      - TG_BOT_API=${TG_BOT_API}
      - TG_ADMIN_USER_IDS=${TG_ADMIN_USER_IDS:-}
      - VK_APP_ID=${VK_APP_ID:-}
      - VK_APP_SECRET=${VK_APP_SECRET:-}
      - VK_GROUP_TOKEN=${VK_GROUP_TOKEN:-}
      - VK_API_VERSION=${VK_API_VERSION:-}
      - VK_ADMIN_USER_IDS=${VK_ADMIN_USER_IDS:-}
      - VK_CALLBACK_SECRET=${VK_CALLBACK_SECRET:-}
      - VK_CALLBACK_CONFIRMATION=${VK_CALLBACK_CONFIRMATION:-}
      - TAP_GOAL=${TAP_GOAL}
      - BINGO_POLLS_TASK_ID=${BINGO_POLLS_TASK_ID}
      - BINGO_TAP10_TASK_ID=${BINGO_TAP10_TASK_ID}
      - BINGO_REACTION_TOP3_TASK_ID=${BINGO_REACTION_TOP3_TASK_ID}
      - BINGO_LINE_TASK_ID=${BINGO_LINE_TASK_ID}
      - BINGO_HAPTIC_TASK_ID=${BINGO_HAPTIC_TASK_ID}
      - BINGO_SHARE_STORIES_TASK_ID=${BINGO_SHARE_STORIES_TASK_ID}
      - BINGO_SHARE_CHAT_TASK_ID=${BINGO_SHARE_CHAT_TASK_ID}
      - BINGO_QR_TASK_ID=${BINGO_QR_TASK_ID}
      - BINGO_MERGE2048_TASK_ID=${BINGO_MERGE2048_TASK_ID}
      - MERGE2048_BINGO_MIN_TILE=${MERGE2048_BINGO_MIN_TILE:-512}
      - REACTION_COUNTDOWN_SECONDS=${REACTION_COUNTDOWN_SECONDS}
      - REACTION_LEADERBOARD_DELAY_SECONDS=${REACTION_LEADERBOARD_DELAY_SECONDS}
      - WS_BROADCAST_URL=http://ws:3001
      - DISPLAY_TOKEN=${DISPLAY_TOKEN:-}
    networks:
      - app
    expose:
      - "3000"
    restart: unless-stopped

  ws:
    image: ${WS_IMAGE:-stachka-perfomance-ws:latest}
    build:
      context: ../ws
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - STATS_WS_PORT=${STATS_WS_PORT}
    networks:
      - app
    expose:
      - "3001"
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-stachka-perfomance-web:latest}
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}
        VITE_TG_BOT_USERNAME: ${VITE_TG_BOT_USERNAME:-}
        VITE_VK_MINI_APP_URL: ${VITE_VK_MINI_APP_URL:-}
    expose:
      - "80"
    networks:
      - app
    depends_on:
      - api
      - ws
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  app:
    driver: bridge

volumes:
  caddy_data:
