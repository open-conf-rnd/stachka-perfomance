# Production: одна служба — nginx со статикой (сборка внутри образа)
# Запуск из корня: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up --build -d
services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
