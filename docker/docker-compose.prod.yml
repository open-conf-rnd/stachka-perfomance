# Prod: локально — build из исходников; CI — образы из GHCR
# Локально: docker compose -f docker/docker-compose.prod.yml up --build -d
# CI: IMAGE_TAG, REGISTRY, GITHUB_REPOSITORY задаются в workflow
#
# SSL: Caddy автоматически получает и обновляет сертификаты Let's Encrypt.
# .env формируется из PROD_ENV.
services:
  caddy:
    image: ${CADDY_IMAGE:-stachka-perfomance-caddy:latest}
    build:
      context: ./caddy
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
    networks:
      - app
    depends_on:
      - web
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-stachka-perfomance-api:latest}
    build:
      context: ../api
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - API_PORT=${API_PORT}
      - TG_BOT_API=${TG_BOT_API}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS}
      - TAP_GOAL=${TAP_GOAL}
      - BINGO_POLLS_TASK_ID=${BINGO_POLLS_TASK_ID}
      - BINGO_TAP10_TASK_ID=${BINGO_TAP10_TASK_ID}
      - BINGO_REACTION_TOP3_TASK_ID=${BINGO_REACTION_TOP3_TASK_ID}
      - BINGO_LINE_TASK_ID=${BINGO_LINE_TASK_ID}
      - BINGO_HAPTIC_TASK_ID=${BINGO_HAPTIC_TASK_ID}
      - BINGO_SHARE_STORIES_TASK_ID=${BINGO_SHARE_STORIES_TASK_ID}
      - BINGO_SHARE_CHAT_TASK_ID=${BINGO_SHARE_CHAT_TASK_ID}
      - BINGO_QR_TASK_ID=${BINGO_QR_TASK_ID}
      - BINGO_STARS_TASK_ID=${BINGO_STARS_TASK_ID}
      - REACTION_COUNTDOWN_SECONDS=${REACTION_COUNTDOWN_SECONDS}
      - REACTION_LEADERBOARD_DELAY_SECONDS=${REACTION_LEADERBOARD_DELAY_SECONDS}
      - TG_STARS_SUPPORT_AMOUNT=${TG_STARS_SUPPORT_AMOUNT}
      - TG_WEBHOOK_SECRET=${TG_WEBHOOK_SECRET}
    networks:
      - app
    expose:
      - "3000"
    restart: unless-stopped

  ws:
    image: ${WS_IMAGE:-stachka-perfomance-ws:latest}
    build:
      context: ../ws
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - STATS_WS_PORT=${STATS_WS_PORT}
    networks:
      - app
    expose:
      - "3001"
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-stachka-perfomance-web:latest}
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    networks:
      - app
    depends_on:
      - api
      - ws
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  app:
    driver: bridge

volumes:
  caddy_data:
