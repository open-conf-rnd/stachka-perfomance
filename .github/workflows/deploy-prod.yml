name: Deploy Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stachka
          POSTGRES_PASSWORD: stachka
          POSTGRES_DB: stachka
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          DATABASE_URL: postgresql://stachka:stachka@localhost:5432/stachka

  build-and-push-api:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-ws:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WS
        uses: docker/build-push-action@v6
        with:
          context: ./ws
          file: ./ws/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-ws:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-ws:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-web:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: |
            VITE_APP_URL=${{ vars.VITE_APP_URL || '' }}
            VITE_STATS_WS_URL=${{ vars.VITE_STATS_WS_URL || '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push-api, build-and-push-ws, build-and-push-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env from secrets
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          printf '%s' "$PROD_ENV" > .env

      - name: Deploy to VPS
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-api:${{ github.sha }}
          WS_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-ws:${{ github.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-web:${{ github.sha }}
          DOCKER_HOST: ssh://${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}
        run: |
          docker compose --env-file .env --file docker/docker-compose.prod.yml pull
          docker compose --env-file .env --file docker/docker-compose.prod.yml up --detach --wait --remove-orphans
