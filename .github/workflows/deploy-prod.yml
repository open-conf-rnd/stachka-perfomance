name: Deploy Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-and-push-api:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-ws:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WS
        uses: docker/build-push-action@v6
        with:
          context: ./ws
          file: ./ws/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-ws:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-ws:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-caddy:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Caddy
        uses: docker/build-push-action@v6
        with:
          context: ./docker/caddy
          file: ./docker/caddy/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-caddy:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-web:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push-api, build-and-push-ws, build-and-push-web, build-and-push-caddy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env from secrets
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          printf '%s' "$PROD_ENV" > .env

      - name: Deploy compose config
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-api:${{ github.sha }}
          WS_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-ws:${{ github.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-web:${{ github.sha }}
          CADDY_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}-caddy:${{ github.sha }}
          DOCKER_HOST: ssh://${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail

          compose_cmd="docker compose --env-file .env --file docker/docker-compose.prod.yml"

          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed, retrying in 15s: $*"
              attempt=$((attempt + 1))
              sleep 15
            done
          }

          $compose_cmd down --remove-orphans || true
          retry 3 timeout 900 $compose_cmd pull
          retry 2 timeout 600 $compose_cmd up --detach --wait --remove-orphans
          $compose_cmd ps
          docker image prune -f || true
